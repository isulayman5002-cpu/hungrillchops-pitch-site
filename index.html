<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungrillchops — Boxed Smallchops & Grills, Lagos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500&family=Caveat:wght@500;700&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --char:#181210;
    --char-2:#241a15;
    --ember:#ff7a3d;
    --paprika:#c8391f;
    --palm:#e7a93d;
    --palm-dim:#a97d2c;
    --parchment:#f4e9d6;
    --parchment-dim:#d8c8a8;
    --line: rgba(244,233,214,0.14);
    --shadow: 0 20px 50px rgba(0,0,0,0.45);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--char);
    color:var(--parchment);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; scroll-behavior:auto !important;}
  }
  a{color:inherit;}
  h1,h2,h3{font-family:'Fraunces', serif; margin:0; letter-spacing:-0.01em;}
  .script{font-family:'Caveat', cursive;}
  .mono{font-family:'Space Mono', monospace;}
  :focus-visible{outline:3px solid var(--ember); outline-offset:3px;}

  /* grill-grate background texture */
  .grate-bg{
    position:absolute; inset:0;
    background-image: repeating-linear-gradient(115deg, rgba(244,233,214,0.035) 0px, rgba(244,233,214,0.035) 2px, transparent 2px, transparent 26px),
                       repeating-linear-gradient(25deg, rgba(244,233,214,0.035) 0px, rgba(244,233,214,0.035) 2px, transparent 2px, transparent 26px);
    pointer-events:none;
  }

  /* ---------- NAV ---------- */
  .nav{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px clamp(20px,5vw,64px);
    background:rgba(24,18,16,0.86);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .nav-brand{display:flex; align-items:center; gap:12px;}
  .nav-brand img{width:38px; height:38px; border-radius:50%; border:2px solid var(--palm);}
  .nav-brand span{font-family:'Fraunces',serif; font-weight:700; font-size:1.15rem; letter-spacing:0.01em;}
  .nav-cta{
    display:flex; gap:10px;
  }
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 18px;
    border-radius:999px;
    font-family:'Work Sans',sans-serif; font-weight:600; font-size:0.88rem;
    text-decoration:none;
    cursor:pointer;
    border:1px solid transparent;
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
    white-space:nowrap;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn-wa{ background:#25D366; color:#0c2415; }
  .btn-wa:hover{ box-shadow:0 8px 20px rgba(37,211,102,0.35); }
  .btn-ig{ background:transparent; color:var(--parchment); border-color:var(--parchment-dim); }
  .btn-ig:hover{ border-color:var(--palm); color:var(--palm); }
  .btn-ghost{background:transparent;border-color:var(--line);color:var(--parchment-dim); padding:9px 16px; font-size:0.82rem;}
  .btn svg{width:16px;height:16px; flex-shrink:0;}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    padding:clamp(60px,10vw,110px) clamp(20px,5vw,64px) clamp(40px,6vw,70px);
    overflow:hidden;
  }
  .hero-inner{
    position:relative; z-index:2;
    max-width:1180px; margin:0 auto;
    display:grid; grid-template-columns:1.15fr 0.85fr; gap:48px;
    align-items:center;
  }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'Space Mono',monospace; font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--palm); margin-bottom:22px;
  }
  .eyebrow::before{content:''; width:22px; height:1px; background:var(--palm);}
  .hero h1{
    font-size:clamp(2.6rem, 5.4vw, 4.6rem);
    font-weight:900;
    line-height:1.02;
    color:var(--parchment);
  }
  .hero h1 em{
    font-style:italic; font-weight:500; color:var(--ember);
  }
  .hero p.lede{
    margin-top:24px;
    font-size:clamp(1.02rem,1.6vw,1.2rem);
    color:var(--parchment-dim);
    max-width:46ch;
    line-height:1.6;
  }
  .hero-ctas{ margin-top:34px; display:flex; gap:14px; flex-wrap:wrap; }
  .hero-ctas .btn{ padding:15px 26px; font-size:0.95rem; }
  .stat-row{
    display:flex; gap:28px; margin-top:46px; flex-wrap:wrap;
  }
  .stat-row div{ display:flex; flex-direction:column; }
  .stat-row .num{ font-family:'Fraunces',serif; font-weight:700; font-size:1.7rem; color:var(--palm); }
  .stat-row .lab{ font-size:0.78rem; color:var(--parchment-dim); text-transform:uppercase; letter-spacing:0.06em; margin-top:2px;}

  .hero-visual{
    position:relative;
    display:flex; align-items:center; justify-content:center;
    min-height:360px;
  }
  .plate-ring{
    position:relative;
    width:min(360px, 80vw); aspect-ratio:1/1;
    border-radius:50%;
    background: conic-gradient(from 210deg, var(--paprika), var(--palm), var(--ember), var(--paprika));
    padding:10px;
    box-shadow:var(--shadow);
    animation:spin 32s linear infinite;
  }
  @media (prefers-reduced-motion: reduce){ .plate-ring{animation:none;} }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .plate-ring::after{
    content:''; position:absolute; inset:10px; border-radius:50%;
    background:var(--char-2);
  }
  .plate-photo{
    position:absolute; inset:34px; border-radius:50%;
    background-size:cover; background-position:center;
    border:4px solid var(--char);
    animation:spin-rev 32s linear infinite;
  }
  @keyframes spin-rev{ to{ transform:rotate(-360deg); } }
  @media (prefers-reduced-motion: reduce){ .plate-photo{animation:none;} }
  .plate-badge{
    position:absolute; bottom:-6px; right:6px;
    background:var(--parchment); color:var(--char);
    font-family:'Space Mono',monospace; font-weight:700; font-size:0.85rem;
    padding:10px 16px; border-radius:14px;
    box-shadow:var(--shadow);
    transform:rotate(-6deg);
  }

  section{ position:relative; padding:clamp(50px,7vw,90px) clamp(20px,5vw,64px); }
  .section-inner{ max-width:1180px; margin:0 auto; position:relative; z-index:2; }
  .section-head{ max-width:640px; margin-bottom:48px; }
  .section-head .eyebrow{ margin-bottom:14px; }
  .section-head h2{ font-size:clamp(1.9rem,3.4vw,2.7rem); font-weight:700; }
  .section-head p{ margin-top:14px; color:var(--parchment-dim); line-height:1.6; font-size:1.02rem; }

  /* ---------- TICKET CARDS ---------- */
  .ticket-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
    gap:34px;
  }
  .ticket{
    position:relative;
    background:var(--char-2);
    border:1px solid var(--line);
    clip-path: polygon(
      0% 6%, 3% 0%, 97% 0%, 100% 6%,
      100% 46%, 96% 50%, 100% 54%,
      100% 94%, 97% 100%, 3% 100%, 0% 94%,
      0% 54%, 4% 50%, 0% 46%
    );
    padding:30px 26px 26px;
    display:flex; flex-direction:column;
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .ticket:hover{ transform:translateY(-6px); box-shadow:var(--shadow); }
  .ticket-top{ display:flex; gap:16px; align-items:flex-start; }
  .ticket-photo{
    width:84px; height:84px; border-radius:50%;
    background-size:cover; background-position:center;
    border:3px solid var(--palm);
    flex-shrink:0;
  }
  .ticket-name{
    font-family:'Caveat',cursive; font-weight:700; font-size:1.7rem; color:var(--ember);
    line-height:1;
  }
  .ticket-tag{
    font-family:'Space Mono',monospace; font-size:0.68rem; color:var(--parchment-dim);
    text-transform:uppercase; letter-spacing:0.08em; margin-top:6px; display:block;
  }
  .ticket-items{
    margin:18px 0 0; padding:0; list-style:none;
    font-size:0.9rem; color:var(--parchment-dim); line-height:1.65;
    border-top:1px dashed var(--line); padding-top:14px;
    flex-grow:1;
  }
  .ticket-items li::before{ content:'— '; color:var(--palm-dim); }
  .ticket-footer{
    margin-top:20px; padding-top:18px; border-top:1px dashed var(--line);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .ticket-price{ font-family:'Space Mono',monospace; font-weight:700; font-size:1.25rem; color:var(--parchment); }
  .ticket-price::before{ content:'\20a6'; color:var(--palm); margin-right:2px; }
  .ticket-actions{ display:flex; gap:8px; margin-top:16px; }
  .icon-btn{
    flex:1;
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:11px 10px; border-radius:10px;
    font-size:0.8rem; font-weight:600; font-family:'Work Sans',sans-serif;
    text-decoration:none; cursor:pointer; border:none;
    transition:transform .15s ease, filter .15s ease;
  }
  .icon-btn:hover{ transform:translateY(-2px); filter:brightness(1.08); }
  .icon-btn svg{ width:15px; height:15px; }
  .icon-btn.wa{ background:#25D366; color:#0c2415; }
  .icon-btn.ig{ background:linear-gradient(45deg,#feda75,#d62976,#4f5bd5); color:#fff; }

  /* ---------- MINI BOXES ---------- */
  .mini-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:18px;
  }
  .mini-card{
    background:var(--char-2); border:1px solid var(--line); border-radius:16px;
    padding:20px; display:flex; flex-direction:column; gap:12px;
  }
  .mini-card .mini-items{ font-size:0.85rem; color:var(--parchment-dim); line-height:1.55; flex-grow:1;}
  .mini-card .mini-price{ font-family:'Space Mono',monospace; font-weight:700; color:var(--palm); font-size:1.05rem; }
  .mini-card .mini-price::before{content:'\20a6';}

  /* ---------- A LA CARTE ---------- */
  .alacarte-wrap{
    background:var(--char-2); border:1px solid var(--line); border-radius:20px;
    padding:clamp(24px,4vw,44px);
    display:grid; grid-template-columns:1.1fr 0.9fr; gap:40px;
  }
  .alacarte-list{ list-style:none; margin:0; padding:0; }
  .alacarte-list li{
    display:flex; justify-content:space-between; align-items:baseline;
    padding:11px 0; border-bottom:1px dashed var(--line);
    font-size:0.98rem;
  }
  .alacarte-list li span:last-child{ font-family:'Space Mono',monospace; color:var(--palm); font-weight:700; }
  .custom-box{
    display:flex; flex-direction:column; justify-content:center;
    gap:16px;
    background:radial-gradient(circle at top left, rgba(230,169,61,0.12), transparent 60%);
    border-left:1px dashed var(--line);
    padding-left:40px;
  }
  @media (max-width:760px){ .custom-box{ border-left:none; padding-left:0; padding-top:24px; border-top:1px dashed var(--line); } }
  .custom-box h3{ font-size:1.5rem; font-weight:700; }
  .custom-box p{ color:var(--parchment-dim); font-size:0.95rem; line-height:1.6; margin:0; }

  /* ---------- LOCATIONS / TRUST ---------- */
  .trust-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:24px;
  }
  .trust-card{
    background:var(--char-2); border:1px solid var(--line); border-radius:16px;
    padding:26px; text-align:left;
  }
  .trust-card .num{ font-family:'Fraunces',serif; font-weight:700; font-size:2.1rem; color:var(--ember); }
  .trust-card .lab{ margin-top:6px; font-size:0.9rem; color:var(--parchment-dim); }

  /* ---------- FOOTER / FINAL CTA ---------- */
  .final-cta{
    text-align:center;
    background:linear-gradient(180deg, var(--char), var(--char-2));
    border-top:1px solid var(--line);
  }
  .final-cta h2{ font-size:clamp(2rem,4vw,3rem); max-width:14ch; margin:0 auto; }
  .final-cta p{ color:var(--parchment-dim); margin:18px auto 34px; max-width:48ch; line-height:1.6; }
  .final-ctas{ display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }

  footer{
    padding:36px clamp(20px,5vw,64px); border-top:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;
    font-size:0.85rem; color:var(--parchment-dim);
  }
  footer .foot-brand{ display:flex; align-items:center; gap:10px; }
  footer .foot-brand img{ width:26px; height:26px; border-radius:50%; }
  footer .foot-links{ display:flex; gap:20px; }
  footer .foot-links a{ text-decoration:none; color:var(--parchment-dim); }
  footer .foot-links a:hover{ color:var(--palm); }

  .marker-strip{
    display:flex; overflow:hidden; border-top:1px solid var(--line); border-bottom:1px solid var(--line);
    background:var(--char-2);
    white-space:nowrap;
  }
  .marker-track{
    display:flex; gap:40px; padding:14px 0;
    animation:scroll-left 26s linear infinite;
    font-family:'Space Mono',monospace; font-size:0.82rem; color:var(--parchment-dim);
    letter-spacing:0.04em;
  }
  .marker-track span{ display:flex; align-items:center; gap:10px; }
  .marker-track span::after{ content:'\2726'; color:var(--palm); margin-left:30px; }
  @keyframes scroll-left{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  @media (prefers-reduced-motion: reduce){ .marker-track{ animation:none; } }

  @media (max-width:900px){
    .hero-inner{ grid-template-columns:1fr; }
    .hero-visual{ order:-1; min-height:280px; }
    .alacarte-wrap{ grid-template-columns:1fr; }
    .trust-grid{ grid-template-columns:1fr 1fr; }
  }
  @media (max-width:560px){
    .nav-cta .btn-ig{ display:none; }
    .trust-grid{ grid-template-columns:1fr; }
    .stat-row{ gap:22px; }
  }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--parchment); color:var(--char);
    padding:14px 22px; border-radius:12px; font-weight:600; font-size:0.9rem;
    box-shadow:var(--shadow);
    opacity:0; pointer-events:none; transition:all .3s ease;
    z-index:100;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
